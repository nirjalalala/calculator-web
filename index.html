<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <h1 class="page-title">SIMPLE CALCULATOR</h1>

    <div class="calculator">

      <div class="display">
        <div class="expression" id="expression"></div>
        <div class="current" id="current">0</div>
      </div>

      <div class="buttons">

        <button class="btn btn--clear"     data-action="clear">CLEAR</button>
        <button class="btn btn--backspace" data-action="backspace">DELETE</button>

        <button class="btn btn--digit"    data-digit="7">7</button>
        <button class="btn btn--digit"    data-digit="8">8</button>
        <button class="btn btn--digit"    data-digit="9">9</button>
        <button class="btn btn--operator" data-operator="÷">÷</button>

        <button class="btn btn--digit"    data-digit="4">4</button>
        <button class="btn btn--digit"    data-digit="5">5</button>
        <button class="btn btn--digit"    data-digit="6">6</button>
        <button class="btn btn--operator" data-operator="×">×</button>

        <button class="btn btn--digit"    data-digit="1">1</button>
        <button class="btn btn--digit"    data-digit="2">2</button>
        <button class="btn btn--digit"    data-digit="3">3</button>
        <button class="btn btn--operator" data-operator="-">-</button>

        <button class="btn btn--operator" data-action="decimal">.</button>
        <button class="btn btn--digit"    data-digit="0">0</button>
        <button class="btn btn--operator" data-action="equals">=</button>
        <button class="btn btn--operator" data-operator="+">+</button>

      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
